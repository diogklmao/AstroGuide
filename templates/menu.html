<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstroGuide</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Raleway:wght@200;300&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/shared-ui-controls.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/glass.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/menu.css') }}">
</head>

<body class="page-menu" data-bg-theme="menu">

    <div class="bg-foto" aria-hidden="true">
        <img src="{{ url_for('static', filename='images/618.jpg') }}" alt="">
    </div>
    <canvas id="three-bg" aria-hidden="true"></canvas>
    <div class="bg-vignette" aria-hidden="true"></div>
    <div class="stars" id="stars"></div>

    <div class="conteudo">
        <div class="titulo">
            <div class="frosted-card glass-panel glass-shimmer">
                <div class="frosted-title">AstroGuide</div>
                <div class="frosted-sub">Observatório Digital</div>
            </div>
        </div>
        <div id="lbl-localizacao">📍 A detetar localização...</div>

        <div class="cards">
            <a class="card card-ceu glass-card" href="/ceu">
                <img class="card-imagem" src="{{ url_for('static', filename='images/SolarSystem.jpg') }}" alt="Céu estrelado">
                <div class="card-overlay"></div>
                <div class="card-conteudo">
                    <canvas id="ic-ceu" width="36" height="36" class="card-emoji"></canvas>
                    <div class="card-titulo">Céu Agora</div>
                    <div class="card-desc">Posição em tempo real do Sol, Lua e planetas visíveis</div>
                </div>
            </a>

            <a class="card card-calendario glass-card" href="/calendario">
                <img class="card-imagem" src="{{ url_for('static', filename='images/Moon.jpg') }}" alt="Lua cheia">
                <div class="card-overlay"></div>
                <div class="card-conteudo">
                    <canvas id="ic-cal" width="36" height="36" class="card-emoji"></canvas>
                    <div class="card-titulo">Calendário Lunar</div>
                    <div class="card-desc">Fases da Lua, eclipses e chuvas de meteoros</div>
                </div>
            </a>

            <a class="card card-observatorio glass-card" href="#">
                <img class="card-imagem" src="{{ url_for('static', filename='images/Sky.jpg') }}" alt="Telescópio">
                <div class="card-overlay"></div>
                <div class="card-conteudo">
                    <canvas id="ic-obs" width="36" height="36" class="card-emoji"></canvas>
                    <div class="card-titulo">Observatório</div>
                    <div class="card-desc">Céu interativo com constelações e estrelas clicáveis</div>
                </div>
            </a>
        </div>
    </div>

    <div id="btn-config" onclick="toggleConfig()">⚙️</div>

    <div id="painel-config" class="glass-panel">
        <div class="config-titulo">⚙ CONFIGURAÇÕES</div>
        <div class="config-linha">
            <label>🔊 Volume</label>
            <input type="range" id="volume" min="0" max="100" value="40" oninput="mudarVolume(this.value)">
            <span id="lbl-volume">40%</span>
        </div>
        <button class="btn-musica" onclick="toggleMusica()">▶ Ativar Música</button>
    </div>

    <audio id="musica" loop>
        <source src="/static/audio/musica.mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="/static/js/three-bg.js"></script>
    <script src="/static/js/shared-ui-controls.js"></script>
    <script src="/static/js/menu.js"></script>
</body>

</html>
