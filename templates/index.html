<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstroGuide</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #05050f;
            color: #dce3f0;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Estrelas de fundo ───────────────────────────────────────────── */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--dur) infinite ease-in-out;
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0.2;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.4);
            }
        }

        /* ── Layout principal ───────────────────────────────────────────── */
        .app {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }

        /* ── Cabeçalho ──────────────────────────────────────────────────── */
        header {
            text-align: center;
            padding: 60px 0 20px;
        }

        header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: #4fc3f7;
            letter-spacing: 2px;
            animation: glow 3s infinite ease-in-out;
        }

        @keyframes glow {

            0%,
            100% {
                text-shadow: 0 0 20px rgba(79, 195, 247, 0.4);
            }

            50% {
                text-shadow: 0 0 50px rgba(79, 195, 247, 0.9);
            }
        }

        header .subtitulo {
            color: #556070;
            font-size: 0.95rem;
            margin-top: 6px;
        }

        #relogio {
            font-family: 'Courier New', monospace;
            color: #334455;
            font-size: 0.85rem;
            margin-top: 4px;
        }

        /* ── Botão voltar ────────────────────────────────────────────────── */
        #btn-voltar {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #0a0a20;
            border: 1px solid #1a1a3e;
            border-radius: 10px;
            color: #4fc3f7;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 8px 16px;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        #btn-voltar:hover {
            border-color: #4fc3f7;
            box-shadow: 0 0 15px rgba(79, 195, 247, 0.2);
        }

        /* ── Navegação ──────────────────────────────────────────────────── */
        nav {
            display: flex;
            gap: 4px;
            background: #0a0a20;
            border-radius: 12px;
            padding: 6px;
            margin: 20px 0;
            border: 1px solid #1a1a3e;
        }

        nav button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: #556070;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        nav button.ativo {
            background: #1a1a4e;
            color: #4fc3f7;
            box-shadow: 0 0 20px rgba(79, 195, 247, 0.15);
        }

        nav button:hover:not(.ativo) {
            color: #aaaacc;
            background: #111128;
        }

        /* ── Ecrãs ──────────────────────────────────────────────────────── */
        .ecra {
            display: none;
        }

        .ecra.ativo {
            display: block;
        }

        /* ── Cards ──────────────────────────────────────────────────────── */
        .card {
            background: #0a0a20;
            border: 1px solid #1a1a3e;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            transition: border-color 0.3s;
        }

        .card:hover {
            border-color: #2a2a5e;
        }

        .card-titulo {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ── Grelha de dados ─────────────────────────────────────────────── */
        .dados-grelha {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .dado {
            background: #0d0d26;
            border-radius: 10px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #15153a;
        }

        .dado-label {
            color: #556070;
            font-size: 0.85rem;
        }

        .dado-valor {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #dce3f0;
            font-weight: 600;
        }

        .visivel-sim {
            color: #4caf50;
        }

        .visivel-nao {
            color: #ef5350;
        }

        /* ── Planetas ────────────────────────────────────────────────────── */
        .planetas-grelha {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }

        .planeta-card {
            background: #0d0d26;
            border: 1px solid #15153a;
            border-radius: 10px;
            padding: 14px;
            transition: all 0.3s ease;
        }

        .planeta-card:hover {
            border-color: #ffcc02;
            box-shadow: 0 0 15px rgba(255, 204, 2, 0.1);
            transform: translateY(-2px);
        }

        .planeta-card.invisivel {
            opacity: 0.35;
        }

        .planeta-nome {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 6px;
            color: #ffcc02;
        }

        .planeta-card.invisivel .planeta-nome {
            color: #445566;
        }

        .planeta-info {
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            color: #556070;
            line-height: 1.6;
        }

        /* ── Calendário ──────────────────────────────────────────────────── */
        .cal-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .cal-nav h2 {
            font-size: 1.4rem;
            color: #4fc3f7;
        }

        .cal-nav button {
            background: #0a0a20;
            border: 1px solid #1a1a3e;
            color: #4fc3f7;
            font-size: 1.2rem;
            width: 38px;
            height: 38px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .cal-nav button:hover {
            background: #1a1a4e;
        }

        .cal-cabecalho {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            margin-bottom: 4px;
        }

        .cal-cabecalho div {
            text-align: center;
            font-size: 0.8rem;
            font-weight: 700;
            color: #334455;
            padding: 8px 0;
        }

        .cal-cabecalho div:nth-child(6),
        .cal-cabecalho div:nth-child(7) {
            color: #5a3030;
        }

        .cal-grelha {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
        }

        .cal-dia {
            aspect-ratio: 1;
            background: #0a0a20;
            border: 1px solid #111128;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 52px;
        }

        .cal-dia:hover {
            border-color: #4fc3f7;
            background: #0f0f2e;
            transform: scale(1.05);
            z-index: 2;
        }

        .cal-dia.hoje {
            border-color: #4fc3f7;
            background: #0f1a30;
            box-shadow: 0 0 12px rgba(79, 195, 247, 0.2);
        }

        .cal-dia.tem-evento {
            border-color: #ff8f00;
        }

        .cal-dia.selecionado {
            border-color: #ce93d8;
            background: #1a0a2e;
            box-shadow: 0 0 15px rgba(206, 147, 216, 0.3);
        }

        .cal-dia.selecionado .cal-dia-num {
            color: #ce93d8;
        }

        .cal-dia-num {
            font-size: 0.9rem;
            font-weight: 600;
            color: #dce3f0;
            line-height: 1;
        }

        .cal-dia.hoje .cal-dia-num {
            color: #4fc3f7;
        }

        .cal-dia.tem-evento .cal-dia-num {
            color: #ff8f00;
        }

        .cal-dia-emoji {
            font-size: 0.85rem;
            line-height: 1;
            margin-top: 3px;
        }

        .cal-dia-ponto {
            font-size: 0.65rem;
            margin-top: 1px;
        }

        .cal-vazio {
            background: transparent;
            border-color: transparent;
            cursor: default;
        }

        .cal-vazio:hover {
            transform: none;
            border-color: transparent;
        }

        .cal-legenda {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
            font-size: 0.8rem;
            color: #445566;
        }

        /* ── Detalhe do dia ──────────────────────────────────────────────── */
        #detalhe-dia {
            margin-top: 16px;
            background: #0a0a20;
            border: 1px solid #1a1a3e;
            border-radius: 16px;
            padding: 24px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        #detalhe-dia.visivel {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .detalhe-titulo {
            font-size: 1.1rem;
            font-weight: 700;
            color: #4fc3f7;
            margin-bottom: 16px;
        }

        .detalhe-linha {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #111128;
        }

        .detalhe-linha:last-child {
            border-bottom: none;
        }

        .detalhe-icon {
            font-size: 1.2rem;
            width: 28px;
            text-align: center;
        }

        .detalhe-label {
            color: #556070;
            font-size: 0.85rem;
            width: 140px;
            flex-shrink: 0;
        }

        .detalhe-valor {
            font-weight: 600;
            font-size: 0.95rem;
        }

        /* ── Evento ──────────────────────────────────────────────────────── */
        .evento-card {
            background: #120900;
            border: 1px solid #ff8f00;
            border-radius: 12px;
            padding: 16px;
            margin-top: 12px;
        }

        .evento-topo {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .evento-badge {
            background: #ff8f00;
            color: #000;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 4px;
            letter-spacing: 1px;
        }

        .evento-nome {
            font-weight: 700;
            font-size: 1rem;
            color: #fff;
        }

        .evento-desc {
            color: #aaa;
            font-size: 0.85rem;
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .evento-horario {
            color: #ff8f00;
            font-size: 0.8rem;
            font-family: 'Courier New', monospace;
        }

        /* ── Loading ─────────────────────────────────────────────────────── */
        .loading {
            text-align: center;
            color: #334455;
            padding: 40px;
            font-size: 0.9rem;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #1a1a3e;
            border-top-color: #4fc3f7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Configurações ───────────────────────────────────────────────── */
        #btn-config {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 48px;
            height: 48px;
            background: #0a0a20;
            border: 1px solid #1a1a3e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.3rem;
            z-index: 9999;
            transition: all 0.3s;
        }

        #btn-config:hover {
            border-color: #4fc3f7;
            box-shadow: 0 0 15px rgba(79, 195, 247, 0.2);
        }

        /* painel de configurações */
        #painel-config {
            position: fixed;
            bottom: 84px;
            right: 40px;
            background: #0a0a20;
            border: 1px solid #1a1a3e;
            border-radius: 16px;
            padding: 20px;
            width: 350px;
            z-index: 100;
            display: none;
            animation: fadeUp 0.2s ease;
        }

        #painel-config.visivel {
            display: block;
        }

        .config-titulo {
            font-size: 0.8rem;
            font-weight: 700;
            color: #4fc3f7;
            margin-bottom: 14px;
            letter-spacing: 1px;
        }

        .config-linha {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .config-linha label {
            font-size: 0.8rem;
            color: #556070;
            white-space: nowrap;
        }

        .config-linha input[type="range"] {
            width: 300px;
            accent-color: #4fc3f7;
            cursor: pointer;
        }

        .config-linha span {
            font-size: 0.75rem;
            color: #4fc3f7;
            width: 50px;
            text-align: right;
        }

        .btn-musica {
            width: 100%;
            padding: 8px;
            background: #111130;
            border: 1px solid #1a1a3e;
            border-radius: 8px;
            color: #dce3f0;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-musica:hover {
            border-color: #4fc3f7;
            color: #4fc3f7;
        }
    </style>
</head>

<body>

    <!-- Botão voltar ao menu -->
    <a id="btn-voltar" href="/">◀ Menu</a>

    <!-- Estrelas de fundo -->
    <div class="stars" id="stars"></div>

    <div class="app">

        <!-- Cabeçalho -->
        <header>
            <div class="subtitulo" id="localizacao">📍 A carregar...</div>
            <div id="relogio">🕐 --/--/---- --:--:--</div>
        </header>

        <!-- Navegação -->
        <nav id="nav-bar">
            <button id="btn-ceu" onclick="mudarEcra('ceu')">🌌 Céu Agora</button>
            <button id="btn-calendario" onclick="mudarEcra('calendario')">📅 Calendário Lunar</button>
        </nav>

        <!-- Ecrã: Céu Agora -->
        <div id="ecra-ceu" class="ecra ativo">
            <div id="ceu-conteudo">
                <div class="loading"><span class="spinner"></span>A carregar dados da NASA...</div>
            </div>
        </div>

        <!-- Ecrã: Calendário -->
        <div id="ecra-calendario" class="ecra">
            <div class="card">
                <div class="cal-nav">
                    <button onclick="mesAnterior()">◀</button>
                    <h2 id="cal-titulo">—</h2>
                    <button onclick="mesSeguinte()">▶</button>
                </div>
                <div class="cal-legenda">
                    <span>🌑🌒🌓🌔🌕🌖🌗🌘 Fase da Lua</span>
                    <span>⚡ Evento astronómico</span>
                    <span style="color:#4fc3f7">■ Hoje</span>
                </div>
                <div class="cal-cabecalho">
                    <div>Seg</div>
                    <div>Ter</div>
                    <div>Qua</div>
                    <div>Qui</div>
                    <div>Sex</div>
                    <div style="color:#5a3535">Sáb</div>
                    <div style="color:#5a3535">Dom</div>
                </div>
                <div class="cal-grelha" id="cal-grelha">
                    <div class="loading"><span class="spinner"></span>A calcular...</div>
                </div>
            </div>
            <div id="detalhe-dia"></div>
        </div>

    </div>

    <!-- Botão configurações -->
    <div id="btn-config" onclick="toggleConfig()">⚙️</div>

    <!-- Painel configurações -->
    <div id="painel-config">
        <div class="config-titulo">⚙ CONFIGURAÇÕES</div>
        <div class="config-linha">
            <label>🔊 Volume</label>
            <input type="range" id="volume" min="0" max="100" value="40" oninput="mudarVolume(this.value)">
            <span id="lbl-volume">40%</span>
        </div>
        <button class="btn-musica" onclick="toggleMusica()">▶ Ativar Música</button>
    </div>

    <!-- Música -->
    <audio id="musica" loop>
        <source src="/static/musica.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ── Variáveis globais ─────────────────────────────────────────────
        let calAno = new Date().getFullYear();
        let calMes = new Date().getMonth() + 1;
        let musicaAtiva = false;

        const MESES_PT = ["", "Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        const DIAS_PT = ["Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado", "Domingo"];

        // ── Estrelas ──────────────────────────────────────────────────────
        function criarEstrelas() {
            const container = document.getElementById("stars");
            for (let i = 0; i < 150; i++) {
                const star = document.createElement("div");
                star.className = "star";
                const size = Math.random() * 2.5 + 0.5;
                star.style.cssText = `width:${size}px;height:${size}px;left:${Math.random() * 100}%;top:${Math.random() * 100}%;--dur:${Math.random() * 4 + 2}s;animation-delay:${Math.random() * 4}s;`;
                container.appendChild(star);
            }
        }

        // ── Relógio ───────────────────────────────────────────────────────
        function atualizarRelogio() {
            const agora = new Date();
            document.getElementById("relogio").textContent = "🕐 " + agora.toLocaleDateString("pt-PT") + "  " + agora.toLocaleTimeString("pt-PT");
        }

        // ── Navegação: SPA (Single Page Application) ──────────────────────────────────
        // Permite trocar de 'ecrã' (Céu ou Calendário) sem recarregar a página.
        function mudarEcra(nome) {
            document.querySelectorAll(".ecra").forEach(e => e.classList.remove("ativo"));
            document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
            document.getElementById("ecra-" + nome).classList.add("ativo");
            const btn = document.getElementById("btn-" + nome);
            if (btn) btn.classList.add("ativo");
            if (nome === "calendario") carregarCalendario();
        }

        // ── Céu Agora ─────────────────────────────────────────────────────
        async function carregarCeu() {
            try {
                const res = await fetch("/api/ceu");
                const data = await res.json();
                document.getElementById("localizacao").textContent = "📍 " + data.location;
                document.getElementById("ceu-conteudo").innerHTML = `
                    <div class="card">
                        <div class="card-titulo" style="color:#ff8f00">☀ Sol</div>
                        <div class="dados-grelha">
                            ${dadoHTML("Altitude", data.sol.altitude + "°")}
                            ${dadoHTML("Azimute", data.sol.azimute + "°")}
                            ${dadoHTML("Distância", data.sol.distancia)}
                            ${dadoVisivel(data.sol.visivel)}
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-titulo" style="color:#b0bec5">🌙 Lua</div>
                        <div class="dados-grelha">
                            ${dadoHTML("Altitude", data.lua.altitude + "°")}
                            ${dadoHTML("Azimute", data.lua.azimute + "°")}
                            ${dadoHTML("Distância", data.lua.distancia)}
                            ${dadoVisivel(data.lua.visivel)}
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-titulo" style="color:#ffcc02">🪐 Planetas</div>
                        <div class="planetas-grelha">${data.planetas.map(planetaHTML).join("")}</div>
                    </div>`;
            } catch (err) {
                document.getElementById("ceu-conteudo").innerHTML = '<div class="loading">❌ Erro ao carregar dados</div>';
            }
        }

        function dadoHTML(label, valor) {
            return `<div class="dado"><span class="dado-label">${label}</span><span class="dado-valor">${valor}</span></div>`;
        }

        function dadoVisivel(visivel) {
            return `<div class="dado"><span class="dado-label">Visível</span><span class="dado-valor ${visivel ? "visivel-sim" : "visivel-nao"}">${visivel ? "Sim ✓" : "Não"}</span></div>`;
        }

        function planetaHTML(p) {
            return `<div class="planeta-card ${p.visivel ? "" : "invisivel"}"><div class="planeta-nome">${p.nome}</div><div class="planeta-info">Alt: ${p.altitude}°<br>Az: ${p.azimute}°<br>${p.visivel ? "✓ Visível" : "× Não visível"}</div></div>`;
        }

        // ── Calendário Lunar: Geração Dinâmica ────────────────────────────────────────
        // Esta função reconstrói a grelha do calendário para o mês/ano selecionados.
        async function carregarCalendario() {
            document.getElementById("cal-titulo").textContent = MESES_PT[calMes] + "  " + calAno;
            document.getElementById("cal-grelha").innerHTML = '<div class="loading" style="grid-column:span 7"><span class="spinner"></span>A calcular fases da lua...</div>';
            document.getElementById("detalhe-dia").innerHTML = "";
            document.getElementById("detalhe-dia").classList.remove("visivel");

            try {
                const res = await fetch(`/api/calendario/${calAno}/${calMes}`);
                const data = await res.json();

                const fasesPorDia = {};
                const eventosPorDia = {};
                data.fases.forEach(f => fasesPorDia[f.dia] = f);
                data.eventos.forEach(e => eventosPorDia[e.dia] = true);

                const hoje = new Date();
                const hojeAno = hoje.getFullYear();
                const hojesMes = hoje.getMonth() + 1;
                const hojesDia = hoje.getDate();
                const primeiroDia = new Date(calAno, calMes - 1, 1).getDay();
                const offset = (primeiroDia === 0) ? 6 : primeiroDia - 1;
                const totalDias = new Date(calAno, calMes, 0).getDate();

                let html = "";
                for (let i = 0; i < offset; i++) html += '<div class="cal-dia cal-vazio"></div>';

                for (let dia = 1; dia <= totalDias; dia++) {
                    const eHoje = (dia === hojesDia && calMes === hojesMes && calAno === hojeAno);
                    const temEv = eventosPorDia[dia] || false;
                    const fase = fasesPorDia[dia];
                    let classes = "cal-dia";
                    if (eHoje) classes += " hoje";
                    if (temEv) classes += " tem-evento";
                    html += `<div class="${classes}" onclick="verDia(${dia})">
                        <span class="cal-dia-num">${dia}</span>
                        ${fase ? `<span class="cal-dia-emoji">${fase.emoji}</span>` : ""}
                        ${temEv ? `<span class="cal-dia-ponto">⚡</span>` : ""}
                    </div>`;
                }
                document.getElementById("cal-grelha").innerHTML = html;
            } catch (err) {
                document.getElementById("cal-grelha").innerHTML = '<div class="loading" style="grid-column:span 7">❌ Erro ao carregar</div>';
            }
        }

        async function verDia(dia) {
            document.querySelectorAll(".cal-dia.selecionado").forEach(d => d.classList.remove("selecionado"));
            const celula = event.target.closest(".cal-dia");
            if (celula) celula.classList.add("selecionado");

            const painel = document.getElementById("detalhe-dia");
            painel.innerHTML = '<div class="loading"><span class="spinner"></span>A carregar...</div>';
            painel.classList.add("visivel");

            const res = await fetch(`/api/dia/${calAno}/${calMes}/${dia}`);
            const data = await res.json();

            const dataObj = new Date(calAno, calMes - 1, dia);
            const nomeDia = DIAS_PT[dataObj.getDay() === 0 ? 6 : dataObj.getDay() - 1];
            const corFase = data.fase.nome === "Lua Cheia" ? "#ffcc02" : "#ce93d8";

            let eventosHTML = data.eventos.length > 0
                ? data.eventos.map(ev => `
                    <div class="evento-card">
                        <div class="evento-topo">
                            <span class="evento-badge">⚡ EVENTO</span>
                            <span class="evento-nome">${ev.emoji} ${ev.nome}</span>
                        </div>
                        <div class="evento-desc">${ev.descricao}</div>
                        <div class="evento-horario">🕐 ${ev.hora_ini} – ${ev.hora_fim} | Pico: ${ev.hora_pico}</div>
                    </div>`).join("")
                : '<p style="color:#334455;font-size:0.85rem;margin-top:12px">Sem eventos astronómicos neste dia.</p>';

            painel.innerHTML = `
                <div class="detalhe-titulo">📅 ${nomeDia}, ${dia} de ${MESES_PT[calMes]} de ${calAno}</div>
                <div class="detalhe-linha"><span class="detalhe-icon">🌅</span><span class="detalhe-label">Nascer do Sol</span><span class="detalhe-valor" style="color:#ffcc80">${data.sol.nascer}</span></div>
                <div class="detalhe-linha"><span class="detalhe-icon">🌇</span><span class="detalhe-label">Pôr do Sol</span><span class="detalhe-valor" style="color:#ff8a65">${data.sol.por}</span></div>
                <div class="detalhe-linha"><span class="detalhe-icon">${data.fase.emoji}</span><span class="detalhe-label">Fase da Lua</span><span class="detalhe-valor" style="color:${corFase}">${data.fase.nome} (${data.fase.percentagem}%)</span></div>
                ${eventosHTML}`;
        }

        function mesAnterior() {
            if (calMes === 1) { calMes = 12; calAno--; } else calMes--;
            carregarCalendario();
        }

        function mesSeguinte() {
            if (calMes === 12) { calMes = 1; calAno++; } else calMes++;
            carregarCalendario();
        }

        // ── Auto-refresh ──────────────────────────────────────────────────
        function autoRefresh() {
            if (document.getElementById("ecra-ceu").classList.contains("ativo")) carregarCeu();
            setTimeout(autoRefresh, 30000);
        }

        // ── Música e configurações ────────────────────────────────────────
        function toggleMusica() {
            const audio = document.getElementById("musica");
            const btn = document.querySelector(".btn-musica");
            if (musicaAtiva) {
                audio.pause();
                btn.textContent = "▶ Ativar Música";
            } else {
                audio.play();
                btn.textContent = "⏸ Pausar Música";
            }
            musicaAtiva = !musicaAtiva;
        }

        function mudarVolume(val) {
            document.getElementById("musica").volume = val / 100;
            document.getElementById("lbl-volume").textContent = val + "%";
        }

        function toggleConfig() {
            document.getElementById("painel-config").classList.toggle("visivel");
        }

        // ── Detetar página e mostrar ecrã correto ─────────────────────────
        const pagina = window.location.pathname;
        if (pagina === "/calendario") {
            document.getElementById("btn-ceu").style.display = "none";
            mudarEcra("calendario");
        } else {
            document.getElementById("btn-calendario").style.display = "none";
            mudarEcra("ceu");
        }

        // ── Inicialização ─────────────────────────────────────────────────
        criarEstrelas();
        atualizarRelogio();
        setInterval(atualizarRelogio, 1000);
        carregarCeu();
        autoRefresh();
        document.getElementById("musica").volume = 0.4;
    </script>
</body>

</html>
