<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstroGuide</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/shared-ui-controls.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>

<body>

    <!-- Botão voltar ao menu -->
    <a id="btn-voltar" href="/">◀ Menu</a>

    <!-- Estrelas de fundo -->
    <div class="stars" id="stars"></div>

    <div class="app">

        <!-- Cabeçalho -->
        <header>
            <div class="subtitulo" id="localizacao">📍 A carregar...</div>
            <div id="relogio">🕐 --/--/---- --:--:--</div>
        </header>

        <!-- Navegação -->
        <nav id="nav-bar">
            <button id="btn-ceu" onclick="mudarEcra('ceu')">🌌 Céu Agora</button>
            <button id="btn-calendario" onclick="mudarEcra('calendario')">📅 Calendário Lunar</button>
        </nav>

        <!-- Ecrã: Céu Agora -->
        <div id="ecra-ceu" class="ecra ativo">
            <div id="ceu-conteudo">
                <div class="loading"><span class="spinner"></span>A carregar dados da NASA...</div>
            </div>
        </div>

        <!-- Ecrã: Calendário -->
        <div id="ecra-calendario" class="ecra">
            <div class="card">
                <div class="cal-nav">
                    <button onclick="mesAnterior()">◀</button>
                    <h2 id="cal-titulo">—</h2>
                    <button onclick="mesSeguinte()">▶</button>
                </div>
                <div class="cal-legenda">
                    <span>🌑🌒🌓🌔🌕🌖🌗🌘 Fase da Lua</span>
                    <span>⚡ Evento astronómico</span>
                    <span style="color:#4fc3f7">■ Hoje</span>
                </div>
                <div class="cal-cabecalho">
                    <div>Seg</div>
                    <div>Ter</div>
                    <div>Qua</div>
                    <div>Qui</div>
                    <div>Sex</div>
                    <div style="color:#5a3535">Sáb</div>
                    <div style="color:#5a3535">Dom</div>
                </div>
                <div class="cal-grelha" id="cal-grelha">
                    <div class="loading"><span class="spinner"></span>A calcular...</div>
                </div>
            </div>
            <div id="detalhe-dia"></div>
        </div>

    </div>
    
    <!-- Botão configurações -->
    <div id="btn-config" onclick="toggleConfig()">⚙️</div>

    <!-- Painel configurações -->
    <div id="painel-config">
        <div class="config-titulo">⚙ CONFIGURAÇÕES</div>
        <div class="config-linha">
            <label>🔊 Volume</label>
            <input type="range" id="volume" min="0" max="100" value="40" oninput="mudarVolume(this.value)">
            <span id="lbl-volume">40%</span>
        </div>
        <button class="btn-musica" onclick="toggleMusica()">▶ Ativar Música</button>
    </div>

    <!-- Música -->
    <audio id="musica" loop>
        <source src="/static/audio/musica.mp3" type="audio/mpeg">
    </audio>

    <script src="/static/js/shared-ui-controls.js"></script>  
    <script src="/static/js/index.js"></script>
</body>

</html>
